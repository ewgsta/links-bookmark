name: Rust CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Linux
      - name: Build Linux x86_64
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Linux artifact
        run: |
          mkdir -p release-artifacts
          cp target/x86_64-unknown-linux-musl/release/links release-artifacts/links-linux-x86_64
          strip release-artifacts/links-linux-x86_64 || true

      # Windows
      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Build Windows
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Prepare Windows artifact
        run: |
          cp target/x86_64-pc-windows-gnu/release/links.exe release-artifacts/links-windows-x86_64.exe

      # macOS ARM64
      - name: Add macOS ARM64 target
        run: rustup target add aarch64-apple-darwin

      - name: Build macOS ARM64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare macOS artifact
        run: |
          cp target/aarch64-apple-darwin/release/links release-artifacts/links-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/links-linux-x86_64
            release-artifacts/links-windows-x86_64.exe
            release-artifacts/links-macos-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
